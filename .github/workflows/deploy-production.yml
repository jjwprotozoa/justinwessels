# .github/workflows/deploy-production.yml — Prebuilt static deploy (replaces Next.js production)
name: Deploy Production

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: prj_foh9O7QvHmCofk8HwNbh4ak0kpur
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install and build Vite site
        run: |
          npm ci
          npm run build

      - name: Package static output for Vercel (no Next.js)
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Resolve Vercel org ID
        id: vercel-org
        run: |
          if [ -n "$VERCEL_ORG_ID" ]; then
            echo "org_id=$VERCEL_ORG_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ORG_ID=$(npx vercel teams ls --token="$VERCEL_TOKEN" --format=json | node -e "
            const teams = JSON.parse(require('fs').readFileSync(0,'utf8'));
            const team = teams.find(t => t.slug === 'justins-projects-f7a019bf') || teams[0];
            if (!team) process.exit(1);
            console.log(team.id);
          ")
          echo "org_id=$ORG_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy prebuilt site to Vercel production
        env:
          VERCEL_ORG_ID: ${{ steps.vercel-org.outputs.org_id }}
        run: |
          npx vercel deploy --prebuilt --prod --yes \
            --token="$VERCEL_TOKEN" \
            --scope=justins-projects-f7a019bf
